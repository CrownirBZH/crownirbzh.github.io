<!DOCTYPE html>
<html>
<head>
    <title>Diagnostic Test</title>
</head>
<body>
    <div id="output">Testing file access...</div>

    <script>
        try {
            var xhr = new XMLHttpRequest();
            // Attempt to read a standard, predictable system file path
            xhr.open('GET', 'file:///etc/passwd', false); 
            xhr.send();
            
            if (xhr.responseText) {
                document.getElementById('output').innerText = xhr.responseText;
            } else {
                document.getElementById('output').innerText = "File access returned empty response.";
            }
        } catch (e) {
            document.getElementById('output').innerText = "Error accessing file: " + e.toString();
        }
    </script>
</body>
</html>
